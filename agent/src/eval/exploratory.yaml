# ============================================================================
# missing-data-honest — agent should narrate gaps, not paper over them
# ============================================================================

- id: md-empty-filer
  category: missing-data-honest
  question: Who funds the Austin City PAC for Quokkas?
  expect:
    contains_role: missing

- id: md-zero-cycle
  category: missing-data-honest
  question: How much did Fair Play Austin PAC raise in 2024?
  expect:
    # Fair Play was a 2018-cycle PAC. 2024 should be empty; agent should
    # widen, see filerActivity from 2018, and narrate the gap.
    must_match: ["no .*(records|contributions|reported|activity)|outside this view|earlier (year|cycle)|2018|2019"]

- id: md-future-cycle
  category: missing-data-honest
  question: How much did Greg Abbott raise in 2030?
  expect:
    # 2030 hasn't happened. Acceptable phrasings: "no records", "no
    # contributions yet", "no 2030 Contributions" (TEC capitalizes the
    # noun), "outside this view", "haven't", "don't have".
    must_match: ["no [^\\n]{0,60}(record|contribution|report|activity|filing|fundraising)|outside|future|haven't|don't have|\\$0|can't answer"]

- id: md-no-such-employer
  category: missing-data-honest
  question: How much did Quokka Industries Inc. employees give to any Austin candidate?
  expect:
    contains_role: missing

- id: md-honest-zero
  category: missing-data-honest
  question: Show me Annie's List contributions to Republican candidates.
  expect:
    # Annie's List funds Democratic women — the answer should honestly
    # report the absence rather than fabricate a list.
    must_not_match:
      - "republican candidates funded"
      - "top republican beneficiaries"

- id: md-tiny-pac
  category: missing-data-honest
  question: Who funds the Concerned Citizens Against Bad Things PAC?
  expect:
    contains_role: missing

- id: md-municipality-out-of-scope
  category: missing-data-honest
  question: Who's funding Houston city council races right now?
  expect:
    contains_role: missing
    must_match: ["austin|tec|state ethics|don't have|out of scope"]

- id: md-school-board
  category: missing-data-honest
  question: Who's funding Round Rock ISD school board races?
  expect:
    # Texas school-board races file with the school district treasurer,
    # not TEC. Whether the agent emits a missing chunk or finds a tangential
    # PAC, the narrative must surface the data-source seam (ISD / district
    # treasurer / school board) rather than papering over it.
    must_match: ["isd|school district|school board|district treasurer"]

