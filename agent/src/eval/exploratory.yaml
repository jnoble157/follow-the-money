# Exploratory soak grid. ~100 prompts across the categories the agent has
# to behave well on at the demo. Failures here gate the demo (95% pass-rate
# floor); failures in questions.yaml gate CI. Categories drive the per-
# category roll-up in the runner's summary.
#
# Assertion legend (see agent/src/eval/run.ts):
#   - expected_tools_contains       must_not_call_tools
#   - max_calls_per_tool            max_citations_per_chunk
#   - must_match                    must_not_match               (case-insensitive)
#   - requires_methods_after_cluster
#   - citation_must_be_grounded
#   - forbids_topDonors_and_topRecipients_both
#   - contains_role                 max_runtime_ms

# ============================================================================
# jurisdiction-routing — pick the right tool family by filer, not by wording
# ============================================================================

- id: jr-watson-state
  category: jurisdiction-routing
  question: How much has Kirk Watson raised in his state Senate filer's history?
  expect:
    expected_tools_contains: [find_state_filer]
    must_not_call_tools: [find_filer, top_donors]
    max_calls_per_tool: { find_state_filer: 2 }
    citation_must_be_grounded: true
    max_citations_per_chunk: 2

- id: jr-watson-mayor
  category: jurisdiction-routing
  question: Who are the largest donors to Mayor Kirk Watson's Austin city campaign?
  expect:
    expected_tools_contains: [find_filer]
    must_not_call_tools: [find_state_filer]
    citation_must_be_grounded: true
    # Watson's filer is the largest in the dataset; the model takes longer
    # to compose the lede paragraph after pulling the top contributors.
    max_runtime_ms: 150000

- id: jr-abbott-state
  category: jurisdiction-routing
  question: Who are Greg Abbott's biggest contributors?
  expect:
    expected_tools_contains: [find_state_filer]
    must_not_call_tools: [find_filer, top_donors]
    citation_must_be_grounded: true

- id: jr-patrick-state
  category: jurisdiction-routing
  question: How much has Dan Patrick raised this cycle?
  expect:
    expected_tools_contains: [find_state_filer]
    must_not_call_tools: [find_filer]

- id: jr-paxton-state
  category: jurisdiction-routing
  question: Who funds Ken Paxton's campaigns?
  expect:
    expected_tools_contains: [find_state_filer]
    must_not_call_tools: [find_filer, top_donors]

- id: jr-austin-pac-only
  category: jurisdiction-routing
  question: Who funded Save Austin Now PAC?
  expect:
    # find_filer is optional when the PAC name is unambiguous and the
    # agent can pass the recipient string straight to top_donors.
    expected_tools_contains: [top_donors]
    must_not_call_tools: [find_state_filer, top_state_donors]

- id: jr-ambiguous-name-watson
  category: jurisdiction-routing
  question: Tell me about Watson's campaign finance.
  expect:
    # Underspecified — agent should pick one jurisdiction and narrate the
    # other or emit a missing note for the unaddressed side. Either way
    # it must not silently mix Austin and TEC totals.
    must_not_match:
      - "across both .* (austin|state)"
      - "combined (austin|state).{0,40}(total|filings)"
    citation_must_be_grounded: true

- id: jr-tec-pac
  category: jurisdiction-routing
  question: What does Annie's List spend its money on?
  expect:
    # Must use the TEC side (not Austin city tools); find_state_filer is
    # optional when the agent passes the filer name straight to the
    # state-side data tool.
    must_not_call_tools: [find_filer, top_donors, get_contributions]
    citation_must_be_grounded: true

- id: jr-tlrpac
  category: jurisdiction-routing
  question: Who are Texans for Lawsuit Reform's biggest donors?
  expect:
    # Must use the TEC side; find_state_filer is optional.
    must_not_call_tools: [find_filer, top_donors, get_contributions]
    citation_must_be_grounded: true

- id: jr-cross-jurisdiction-honest
  category: jurisdiction-routing
  question: Compare Greg Casar's Austin council fundraising to his federal House fundraising.
  expect:
    # Casar held both, but federal is out of scope. Agent should answer the
    # Austin side and emit a missing note for the federal side.
    contains_role: missing
    must_match: ["fec|federal election commission|u\\.?s\\.? house|federal"]

# ============================================================================
# happy-path-analytics — direct-recipient questions the agent should nail
# ============================================================================

- id: hp-uber-2016
  category: happy-path-analytics
  question: Who funded Ridesharing Works for Austin in 2016?
  expect:
    expected_tools_contains: [top_donors]
