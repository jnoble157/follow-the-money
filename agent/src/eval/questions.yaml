# Hand-graded eval set. Three entries today; grows to twelve before submission.
# Each entry asserts the agent's behavior on the headline questions of the demo.
# Tunings of the system prompt or tool surface that change a "passes" to a
# "fails" here is a regression — fix the change, not the assertion.

- id: b3-uber
  question: Who funded Ridesharing Works for Austin in 2016?
  expect:
    triggers_disambiguation: false
    # The Ridesharing Works PAC has effectively two donors; the headline
    # number for Uber is well-known.
    top_donor_name_includes: Uber
    top_donor_total_min: 2900000
    top_donor_total_max: 3050000

- id: s1-epstein
  question: Who was the biggest individual political spender in Austin's 2018 ballot cycle?
  expect:
    # The agent must hit the cluster_employer_variants tool and ask the user
    # before reporting a merged headline. This is the demo moment.
    triggers_disambiguation: true

- id: federal-refusal
  question: Who are Ted Cruz's biggest donors?
  expect:
    # Federal-only entity. The agent should emit a missing-data note and stop.
    contains_role: missing
    triggers_disambiguation: false
