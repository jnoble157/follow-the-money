  question: Who are the top 5 donors to Kirk Watson's Austin mayoral campaign?
  expect:
    # find_filer is optional when the candidate name is unambiguous.
    expected_tools_contains: [top_donors]
    must_not_call_tools: [find_state_filer, top_state_donors]
    citation_must_be_grounded: true

- id: hp-abbott-top-state-donors
  category: happy-path-analytics
  question: Who are the top donors to Greg Abbott in the most recent cycle?
  expect:
    expected_tools_contains: [find_state_filer, top_state_donors]
    citation_must_be_grounded: true

- id: hp-pacs-2024
  category: happy-path-analytics
  question: What were the most active Austin PACs in 2024?
  expect:
    expected_tools_contains: [top_pacs]

- id: hp-fair-play-2018
  category: happy-path-analytics
  question: How much did Fair Play Austin PAC raise in the 2018 ballot cycle?
  expect:
    # Either find_filer (resolve first) or top_donors (with the PAC name
    # straight through) is fine — both end at a grounded citation.
    expected_tools_contains: [top_donors]
    citation_must_be_grounded: true

- id: hp-watson-expenditures
  category: happy-path-analytics
  question: What did Kirk Watson's Austin campaign committee spend the most money on in 2022?
  expect:
    expected_tools_contains: [get_expenditures]
    citation_must_be_grounded: true

- id: hp-watson-state-expenditures
  category: happy-path-analytics
  question: What were the largest expenditures from Kirk Watson's state Senate committee?
  expect:
    expected_tools_contains: [find_state_filer, get_state_expenditures]

- id: hp-tlr-recipients
  category: happy-path-analytics
  question: Which Texas state candidates got the most money from Texans for Lawsuit Reform?
  expect:
    # Outflow question — top_recipients shape; right rail renders recipients.
    # find_state_filer is optional if the agent passes the contributor name
    # straight to get_state_contributions.
    expected_tools_contains: [get_state_contributions]
    forbids_topDonors_and_topRecipients_both: true

- id: hp-annie-recipients
  category: happy-path-analytics
  question: Which Texas state candidates has Annie's List backed?
  expect:
    # Outflow question — same shape as TLR. find_state_filer is optional.
    expected_tools_contains: [get_state_contributions]
    forbids_topDonors_and_topRecipients_both: true

- id: hp-prop-b-2021
  category: happy-path-analytics
  question: How much was raised by both sides in Austin's 2021 Proposition B fight?
  expect:
    expected_tools_contains: [top_pacs]

- id: hp-empty-cycle-fallback
  category: happy-path-analytics
  question: How much did Save Austin Now raise in 2025?
  expect:
    # Likely zero rows for that cycle — the agent should widen or say so.
    citation_must_be_grounded: true
    must_not_match:
      - "no records found"
      # ^ inverse: we want the agent to NOT silently say nothing without
      #   first widening or probing filerActivity. If 2025 truly has nothing,
      #   role:missing is fine; the must_not_match guards the lazy case where
      #   the agent says "no records found" without surfacing any year data.

# ============================================================================
# employer-rollup-silent — variants must trigger cluster + methods chunk
# ============================================================================

- id: er-fair-play-cluster
  category: employer-rollup-silent
  question: Who were Fair Play Austin PAC's biggest individual donors?
  expect:
    expected_tools_contains: [top_donors, cluster_employer_variants]
    requires_methods_after_cluster: true
    must_match: ["epstein", "prophet capital"]
    citation_must_be_grounded: true

- id: er-watson-endeavor-rollup
  category: employer-rollup-silent
  question: How big a slice of Kirk Watson's Austin donor file comes from Endeavor Real Estate Group employees?
  expect:
    # Watson's filer is huge; an employer rollup over the whole donor
    # file is genuinely hard with the current tools. The agent's
    # acceptable behavior set is: (a) pull get_contributions with
    # employerLike=Endeavor and narrate, or (b) bail with the synthetic
    # missing chunk. Either way at least one tool must be called and the
    # answer must be grounded if rows came back. See known_gaps.md.
    expected_tools_contains: [find_filer]

- id: er-narrative-merge-forbidden
  category: employer-rollup-silent
  question: Show me Robert Epstein's contributions to Fair Play Austin PAC.
  expect:
    # The agent must not merge the two employer variants into a narrative
    # rollup without calling cluster_employer_variants first.
    must_not_match:
      - "prophet capital and prophet capital management"
      - "(prophet capital, prophet capital management|prophet capital / prophet capital management).*total"

- id: er-cluster-confidence-cited
  category: employer-rollup-silent
  question: Roll up Robert Epstein's giving across Austin PACs.
  expect:
    # The question asks to roll up by *PAC*, not by employer. Epstein's
    # employer is consistently "Prophet Capital" in Austin data, so the
    # agent legitimately skips cluster_employer_variants. We only require
    # a grounded rollup that names Epstein.
    expected_tools_contains: [get_contributions]
    must_match: ["epstein"]
    citation_must_be_grounded: true

- id: er-no-variants-no-methods
  category: employer-rollup-silent
  question: How much did Lyft give to Ridesharing Works for Austin in 2016?
  expect:
    # Lyft has only one employer string — agent should NOT call cluster.
    must_not_call_tools: [cluster_employer_variants]
    must_not_match: ["auto-merged", "rolled up"]

# ============================================================================
# lobby-cross-reference — cross_reference_lobby tool
# ============================================================================

- id: lobby-cross-tier
  category: lobby-cross-reference
  question: Which Austin city lobbyists also lobby the Texas state legislature?
  expect:
    expected_tools_contains: [cross_reference_lobby]
    citation_must_be_grounded: true

- id: lobby-endeavor-clients
  category: lobby-cross-reference
  question: Is Endeavor Real Estate Group registered as an Austin city lobby client?
  expect:
    expected_tools_contains: [cross_reference_lobby]

- id: lobby-confidence-shown
  category: lobby-cross-reference
  question: Find lobbyists who appear in both Austin city filings and TEC state filings, and tell me how confident you are about each match.
  expect:
    expected_tools_contains: [cross_reference_lobby]
